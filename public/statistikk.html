<!DOCTYPE html>
<html lang="no">
<head>
  <title>Statistikk – Jaktlaget</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="utf-8">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <script src="supabaseClient.js"></script>
  <script src="auth.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      flex-shrink: 0;
      background: #2a3a2e;
      padding: 0 20px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 28px;
      height: 28px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-app-name {
      font-size: 15px;
      font-weight: 500;
      color: #ffffff;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #user-greeting {
      font-size: 13px;
      color: #a8c090;
    }

    #logout-btn {
      background: rgba(255,255,255,0.08);
      border: 0.5px solid rgba(255,255,255,0.2);
      color: #ffffff;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    #logout-btn:hover { background: rgba(255,255,255,0.16); }

    /* ── App row ── */
    #app-row {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 190px;
      flex-shrink: 0;
      background: #f5f3ee;
      border-right: 0.5px solid #d0cec8;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .sidebar-top { flex: 1; }

    .sidebar-section-label {
      font-size: 11px;
      font-weight: 500;
      color: #2a3a2e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .sidebar-item {
      display: block;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    .sidebar-item.active {
      background: #2a3a2e;
      color: #ffffff;
    }

    .sidebar-item.inactive {
      background: transparent;
      color: #3a4e3e;
    }
    .sidebar-item.inactive:hover { background: rgba(42,58,46,0.08); }

    .sidebar-footer {
      border-top: 0.5px solid #d0cec8;
      padding-top: 10px;
      font-size: 11px;
      color: #888;
    }

    /* ── Content area ── */
    #content {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      background: #ffffff;
    }

    #page-title {
      font-size: 18px;
      font-weight: 500;
      color: #2a3a2e;
      margin-bottom: 1.25rem;
    }

    #status-msg {
      font-size: 14px;
      color: #888;
    }

    #status-msg.error {
      color: #c0392b;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead tr {
      border-bottom: 0.5px solid #d0cec8;
    }

    thead th {
      font-size: 11px;
      font-weight: 500;
      color: #2a3a2e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 8px 12px;
      text-align: left;
    }

    tbody tr:nth-child(odd)  { background: #ffffff; }
    tbody tr:nth-child(even) { background: #fafaf8; }
    tbody tr { border-bottom: 0.5px solid #ece9e3; }
    tbody tr:last-child { border-bottom: none; }

    tbody td {
      padding: 8px 12px;
      color: #333;
    }
  </style>
</head>
<body>

  <!-- Header bar -->
  <div id="header">
    <div class="header-left">
      <div class="header-icon">
        <svg width="16" height="19" viewBox="0 0 22 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M11 1C6.58 1 3 4.58 3 9c0 6 8 16 8 16s8-10 8-16c0-4.42-3.58-8-8-8z" stroke="#a8c090" stroke-width="1.5" fill="none"/>
          <circle cx="11" cy="9" r="3" fill="#2a3a2e" stroke="#a8c090" stroke-width="1.5"/>
        </svg>
      </div>
      <span class="header-app-name">Jaktlaget</span>
    </div>
    <div class="header-right">
      <span id="user-greeting"></span>
      <button id="logout-btn">Logg ut</button>
    </div>
  </div>

  <!-- App row -->
  <div id="app-row">

    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-section-label">Navigasjon</div>
        <a class="sidebar-item inactive" href="index.html">Jaktplanlegging</a>
        <a class="sidebar-item active" href="statistikk.html">Statistikk</a>
      </div>
      <div class="sidebar-footer">Sund Jaktfelt</div>
    </div>

    <!-- Content -->
    <div id="content">
      <div id="page-title">Fellinger</div>
      <div id="status-msg">Laster inn data…</div>
      <table id="stats-table" style="display:none">
        <thead>
          <tr>
            <th>Dyretype</th>
            <th>Sted</th>
            <th>Jeger</th>
            <th>År</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

  </div><!-- end #app-row -->

  <script>
  (async function() {
    await requireAuth();

    var session = await db.auth.getSession();
    var userEmail = (session.data.session && session.data.session.user && session.data.session.user.email) ? session.data.session.user.email : '';
    document.getElementById('user-greeting').textContent = 'Hei, ' + userEmail;

    document.getElementById('logout-btn').addEventListener('click', async function() {
      await db.auth.signOut();
      window.location.href = 'login.html';
    });

    var statusMsg = document.getElementById('status-msg');
    var statsTable = document.getElementById('stats-table');
    var tableBody = document.getElementById('table-body');

    var res = await db.from('fellinger').select('*');

    if (res.error) {
      statusMsg.textContent = 'Kunne ikke laste inn data. Prøv igjen.';
      statusMsg.classList.add('error');
      return;
    }

    statusMsg.style.display = 'none';
    statsTable.style.display = 'table';

    res.data.forEach(function(row) {
      var parts = (row.beskrivelse || '').split(' - ');
      var tr = document.createElement('tr');
      [parts[0] || '', parts[1] || '', parts[2] || '', row.year || ''].forEach(function(text) {
        var td = document.createElement('td');
        td.textContent = text;
        tr.appendChild(td);
      });
      tableBody.appendChild(tr);
    });
  })();
  </script>
</body>
</html>
