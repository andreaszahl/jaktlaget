<!DOCTYPE html>
<html>
<head>
  <title>Statistikk – Fellingskart Sund Jaktfelt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="utf-8">

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <script src="supabaseClient.js"></script>
  <script src="auth.js"></script>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: sans-serif; background: #f7f7f7; }

    #sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 42px;
      background: #fff;
      z-index: 1000;
      overflow: hidden;
      transition: width 0.25s ease;
      box-shadow: 2px 0 8px rgba(0,0,0,0.18);
    }
    #sidebar:hover { width: 210px; }

    .sidebar-header {
      display: flex;
      align-items: center;
      padding: 11px 12px;
      border-bottom: 1px solid #e8e8e8;
      white-space: nowrap;
    }
    .sidebar-hamburger { font-size: 20px; flex-shrink: 0; color: #444; }
    .sidebar-title {
      margin-left: 13px;
      font-size: 13px;
      font-weight: 600;
      color: #222;
      opacity: 0;
      transition: opacity 0.15s;
    }
    #sidebar:hover .sidebar-title { opacity: 1; }

    .menu-section { padding: 5px 0; }
    .menu-section + .menu-section { border-top: 1px solid #e8e8e8; }

    .menu-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      text-decoration: none;
      color: #333;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    .menu-item:hover { background: #f2f2f2; }
    .menu-item.active { background: #eef4ff; color: #1a56db; font-weight: 600; }
    .menu-icon { font-size: 16px; width: 18px; text-align: center; flex-shrink: 0; }
    .menu-label {
      margin-left: 13px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    #sidebar:hover .menu-label { opacity: 1; }

    #content {
      margin-left: 42px;
      min-height: 100vh;
      padding: 32px 40px;
    }

    h1 { font-size: 22px; font-weight: 700; margin: 0 0 20px; color: #1a1a1a; }

    #filter {
      width: 320px;
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      outline: none;
    }
    #filter:focus { border-color: #1a56db; }

    #row-count { margin-top: 8px; font-size: 13px; color: #666; }

    table {
      margin-top: 16px;
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border-radius: 6px;
      overflow: hidden;
      font-size: 14px;
    }

    thead th {
      background: #f0f0f0;
      padding: 11px 14px;
      text-align: left;
      font-weight: 600;
      color: #333;
      border-bottom: 2px solid #ddd;
    }

    tbody td { padding: 9px 14px; color: #333; border-bottom: 1px solid #eee; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #f8f8f8; }

    .no-results { text-align: center; color: #999; font-style: italic; padding: 24px !important; }
  </style>
</head>
<body>

  <div id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-hamburger">&#9776;</span>
      <span class="sidebar-title">Fellingskart</span>
    </div>
    <div class="menu-section">
      <a class="menu-item" href="index.html">
        <span class="menu-icon">🗺️</span>
        <span class="menu-label">Kartlag</span>
      </a>
      <a class="menu-item" href="#">
        <span class="menu-icon">📍</span>
        <span class="menu-label">Fellinger</span>
      </a>
    </div>
    <div class="menu-section">
      <a class="menu-item active" href="statistikk.html">
        <span class="menu-icon">📊</span>
        <span class="menu-label">Statistikk</span>
      </a>
      <a class="menu-item" href="#">
        <span class="menu-icon">⚙️</span>
        <span class="menu-label">Innstillinger</span>
      </a>
    </div>
  </div>

  <div id="content">
    <h1>Fellingsstatistikk</h1>
    <input type="text" id="filter" placeholder="Filtrer tabell...">
    <div id="row-count"></div>
    <table id="stats-table">
      <thead>
        <tr>
          <th>Dyretype</th>
          <th>Sted</th>
          <th>Jeger</th>
          <th>År</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <script>
  (async function() {
    await requireAuth();

    var allRows = [];

    $('#table-body').html('<tr><td class="no-results" colspan="4">Laster...</td></tr>');

    db.from('fellinger').select('*').then(function(res) {
      if (res.error) {
        $('#table-body').html('<tr><td class="no-results" colspan="4">Feil: kunne ikke laste data</td></tr>');
        return;
      }
      allRows = res.data;
      renderTable(allRows);
    });

    function parseRow(row) {
      var parts = (row.beskrivelse || '').split(' - ');
      return {
        dyretype: parts[0] || '',
        sted:     parts[1] || '',
        jeger:    parts[2] || '',
        year:     row.year
      };
    }

    function renderTable(rows) {
      var tbody = $('#table-body');
      tbody.empty();
      if (rows.length === 0) {
        tbody.append('<tr><td class="no-results" colspan="4">Ingen treff</td></tr>');
      } else {
        rows.forEach(function(row) {
          var p = parseRow(row);
          tbody.append(
            '<tr>' +
              '<td>' + p.dyretype + '</td>' +
              '<td>' + p.sted     + '</td>' +
              '<td>' + p.jeger    + '</td>' +
              '<td>' + p.year     + '</td>' +
            '</tr>'
          );
        });
      }
      $('#row-count').text(rows.length + ' rad' + (rows.length === 1 ? '' : 'er'));
    }

    $('#filter').on('input', function() {
      var q = $(this).val().toLowerCase();
      var filtered = allRows.filter(function(row) {
        return (row.beskrivelse + ' ' + row.year).toLowerCase().includes(q);
      });
      renderTable(filtered);
    });
  })(); // end requireAuth IIFE
  </script>
</body>
</html>
